<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product — Inventory MS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>📦 <span>Inventory</span>MS</h2>
      <p>Local Storage Edition</p>
    </div>
    <ul class="nav-links">
      <li><a href="index.html"><span class="nav-icon">🏠</span><span>Dashboard</span></a></li>
      <li><a href="products.html"><span class="nav-icon">📋</span><span>Products</span></a></li>
      <li><a href="add-product.html" class="active"><span class="nav-icon">➕</span><span>Add Product</span></a></li>
      <li><a href="categories.html"><span class="nav-icon">🏷️</span><span>Categories</span></a></li>
      <li><a href="reports.html"><span class="nav-icon">📊</span><span>Reports</span></a></li>
    </ul>
    <div class="sidebar-footer">Data saved locally in browser</div>
  </aside>


  <main class="main">

    <div class="page-header">
      <div>
        <h1 id="form-title">Add New Product</h1>
        <p id="form-subtitle">Fill in the details below to add a product.</p>
      </div>
      <a href="products.html" class="btn btn-outline">← Back to Products</a>
    </div>

    <div id="form-alert" style="display:none" class="alert alert-success">
      ✅ Product saved successfully!
    </div>

    <div class="card" style="max-width: 680px">
      <form id="product-form" novalidate>

        <input type="hidden" id="product-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="product-name">Product Name *</label>
            <input
              type="text"
              id="product-name"
              placeholder="e.g. Wireless Mouse"
              required
            />
          </div>

          <!-- Category -->
          <div class="form-group">
            <label for="product-category">Category *</label>
            <select id="product-category" required>
              <option value="">Select category...</option>
              <!-- Populated by products.js from localStorage -->
            </select>
          </div>
        </div>

        <div class="form-grid">
          <!-- Quantity -->
          <div class="form-group">
            <label for="product-qty">Quantity *</label>
            <input
              type="number"
              id="product-qty"
              placeholder="e.g. 50"
              min="0"
              required
            />
          </div>

          <!-- Price -->
          <div class="form-group">
            <label for="product-price">Price (₹) *</label>
            <input
              type="number"
              id="product-price"
              placeholder="e.g. 799"
              min="0"
              step="0.01"
              required
            />
          </div>
        </div>

        <div class="form-grid">
          <!-- Low Stock Threshold -->
          <div class="form-group">
            <label for="product-threshold">Low Stock Alert Below</label>
            <input
              type="number"
              id="product-threshold"
              placeholder="e.g. 10"
              min="0"
              value="10"
            />
          </div>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="product-desc">Description</label>
          <textarea
            id="product-desc"
            placeholder="Optional notes about this product..."
          ></textarea>
        </div>

        <!-- Buttons -->
        <div style="display:flex; gap:12px; margin-top:8px">
          <button type="submit" class="btn btn-primary">💾 Save Product</button>
          <button type="button" class="btn btn-outline" onclick="resetForm()">🔄 Clear Form</button>
        </div>

      </form>
    </div>

  </main>

  <script src="js/utils.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
